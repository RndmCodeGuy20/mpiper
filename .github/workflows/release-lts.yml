name: Release LTS Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  issues: write
  packages: write
  pull-requests: write

concurrency:
  group: release-lts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-metadata:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      short-sha: ${{ steps.meta.outputs.short_sha }}
      build-time: ${{ steps.meta.outputs.build_time }}
      lts-tag: ${{ steps.meta.outputs.lts_tag }}
      version-lts-tag: ${{ steps.meta.outputs.version_lts_tag }}
      hash-lts-tag: ${{ steps.meta.outputs.hash_lts_tag }}
      image-repo: ${{ steps.repo.outputs.repository }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version and compute tags
        id: meta
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < .version 2>/dev/null || true)"
          if [ -z "$VERSION" ]; then
            VERSION="0.1.0"
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "lts_tag=lts" >> "$GITHUB_OUTPUT"
          echo "version_lts_tag=${VERSION}-lts" >> "$GITHUB_OUTPUT"
          echo "hash_lts_tag=${SHORT_SHA}-lts" >> "$GITHUB_OUTPUT"

      - name: Normalize repository name
        id: repo
        shell: bash
        run: |
          echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  build-and-push-lts:
    name: Build and Push LTS Image
    runs-on: ubuntu-latest
    needs:
      - prepare-metadata
    outputs:
      image-digest: ${{ steps.build-and-push.outputs.digest }}
      lts-tag: ${{ needs.prepare-metadata.outputs.lts-tag }}
      version-lts-tag: ${{ needs.prepare-metadata.outputs.version-lts-tag }}
      hash-lts-tag: ${{ needs.prepare-metadata.outputs.hash-lts-tag }}
      deployment-id: ${{ steps.create-deployment.outputs.deployment_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Deployment
        uses: actions/github-script@v6
        id: create-deployment
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: 'Building and pushing Docker image to production'
            });
            core.setOutput('deployment_id', deployment.data.id);
            core.info(`Created deployment ID: ${deployment.data.id}`);

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/mpiper.dockerfile
          push: true
          build-args: |
            ENV=prod
            COMMIT_HASH=${{ github.sha }}
            BUILD_TIME=${{ needs.prepare-metadata.outputs.build-time }}
            VERSION=${{ needs.prepare-metadata.outputs.version }}
            AUTHOR=${{ github.actor }}
          tags: |
            ghcr.io/${{ needs.prepare-metadata.outputs.image-repo }}:${{ needs.prepare-metadata.outputs.lts-tag }}
            ghcr.io/${{ needs.prepare-metadata.outputs.image-repo }}:${{ needs.prepare-metadata.outputs.version-lts-tag }}
            ghcr.io/${{ needs.prepare-metadata.outputs.image-repo }}:${{ needs.prepare-metadata.outputs.hash-lts-tag }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare-metadata.outputs.version }}

      - name: Save image tags as artifact
        run: |
          echo "${{ needs.prepare-metadata.outputs.lts-tag }}" > image_tag.txt
          echo "${{ needs.prepare-metadata.outputs.version-lts-tag }}" >> image_tag.txt
          echo "${{ needs.prepare-metadata.outputs.hash-lts-tag }}" >> image_tag.txt

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image-tags
          path: image_tag.txt

      - name: Write release summary
        uses: actions/github-script@v6
        with:
          script: |
            const digest = '${{ steps.build-and-push.outputs.digest }}';
            const repo = 'ghcr.io/${{ needs.prepare-metadata.outputs.image-repo }}';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            await core.summary
              .addHeading('LTS Release Published')
              .addTable([
                [{ data: 'Property', header: true }, { data: 'Value', header: true }],
                ['Repository', '${{ github.repository }}'],
                ['Branch', '${{ github.ref_name }}'],
                ['Commit', '${{ github.sha }}'],
                ['Version', '${{ needs.prepare-metadata.outputs.version }}'],
                ['Digest', digest]
              ])
              .addHeading('Published Tags', 3)
              .addList([
                `${repo}:${{ needs.prepare-metadata.outputs.lts-tag }}`,
                `${repo}:${{ needs.prepare-metadata.outputs.version-lts-tag }}`,
                `${repo}:${{ needs.prepare-metadata.outputs.hash-lts-tag }}`
              ])
              .addLink('View Workflow Run', runUrl)
              .write();

  notify-success:
    needs:
      - prepare-metadata
      - build-and-push-lts
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Slack tooling
        run: sudo apt-get update && sudo apt-get install -y gettext-base jq

      - name: Download image tags
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tags

      - name: Read image tags
        id: read-tags
        run: |
          TAGS=$(cat image_tag.txt | sed 's/^/• `/' | sed 's/$/`/' | tr '\n' ' ')
          echo "formatted-tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Update Deployment Status to success
        if: ${{ needs.build-and-push-lts.outputs.deployment-id != '' }}
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ needs.build-and-push-lts.outputs.deployment-id }},
              state: 'success',
              environment_url: 'https://production.yourapp.com',
              description: 'Image pushed: ${{ needs.build-and-push-lts.outputs.hash-lts-tag }}'
            });

      - name: Comment on PR with build info
        uses: actions/github-script@v6
        with:
          script: |
            const digest = '${{ needs.build-and-push-lts.outputs.image-digest }}';
            const shaTag = '${{ needs.build-and-push-lts.outputs.hash-lts-tag }}';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const pkgUrl = `https://github.com/users/${{ github.actor }}/packages/container/package/${{ github.event.repository.name }}`;

            const body = [
              '## Production LTS Release Successful',
              '',
              '| Property | Value |',
              '|---|---|',
              `| **Branch** | \`${{ github.ref_name }}\` |`,
              `| **Commit** | \`${{ github.sha }}\` |`,
              `| **Version-LTS Tag** | \`${{ needs.build-and-push-lts.outputs.version-lts-tag }}\` |`,
              `| **Hash-LTS Tag** | \`${shaTag}\` |`,
              `| **Digest** | \`${digest}\` |`,
              '',
              `📦 [View Package Registry](${pkgUrl})`,
              `🔄 [View Workflow Run #${{ github.run_number }}](${runUrl})`,
            ].join('\n');

            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${{ github.ref_name }}`
            });

            if (prs.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs.data[0].number,
                body
              });
              core.info(`Commented on PR #${prs.data[0].number}`);
            } else {
              core.info('No open PR found, skipping PR comment.');
            }

      - name: Send Slack notification - Success
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SHA_SHORT: ${{ needs.prepare-metadata.outputs.short-sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          SEMVER_TAG: ${{ needs.build-and-push-lts.outputs.version-lts-tag }}
          SHA_TAG: ${{ needs.build-and-push-lts.outputs.hash-lts-tag }}
          IMAGE_DIGEST: ${{ needs.build-and-push-lts.outputs.image-digest }}
          BUILD_TIMESTAMP: ${{ needs.prepare-metadata.outputs.build-time }}
        run: |
          PAYLOAD=$(envsubst < .github/slack/success.json)
          echo "$PAYLOAD" | jq . > /dev/null
          curl -f -X POST \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"

  notify-failure:
    needs:
      - prepare-metadata
      - build-and-push-lts
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Slack tooling
        run: sudo apt-get update && sudo apt-get install -y gettext-base jq

      - name: Update Deployment Status to failure
        if: ${{ needs.build-and-push-lts.outputs.deployment-id != '' }}
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ needs.build-and-push-lts.outputs.deployment-id }},
              state: 'failure',
              description: 'Docker production LTS build or push failed'
            });

      - name: Comment failure on PR
        uses: actions/github-script@v6
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const body = [
              '## Production LTS Release Failed',
              '',
              '| Property | Value |',
              '|---|---|',
              `| **Branch** | \`${{ github.ref_name }}\` |`,
              `| **Commit** | \`${{ github.sha }}\` |`,
              `| **Triggered by** | ${{ github.actor }} |`,
              '',
              `🔴 [View Failed Run #${{ github.run_number }}](${runUrl})`,
            ].join('\n');

            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${{ github.ref_name }}`
            });

            if (prs.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs.data[0].number,
                body
              });
            }

      - name: Send Slack notification - Failure
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SHA_SHORT: ${{ needs.prepare-metadata.outputs.short-sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          BUILD_TIMESTAMP: ${{ needs.prepare-metadata.outputs.build-time }}
        run: |
          PAYLOAD=$(envsubst < .github/slack/failure.json)
          echo "$PAYLOAD" | jq . > /dev/null
          curl -f -X POST \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
