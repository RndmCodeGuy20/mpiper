# ============================================================================
# Grafana Tempo Configuration
# Backend for distributed tracing storage and querying
# ============================================================================

server:
  http_listen_port: 3200
  log_level: info

# Query frontend for improved query performance
query_frontend:
  search:
    enabled: true
  trace_by_id:
    enabled: true

# Distributor receives traces from OTLP and other protocols
distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317
    jaeger:
      protocols:
        thrift_http:
          endpoint: 0.0.0.0:14268
        grpc:
          endpoint: 0.0.0.0:14250
    zipkin:
      endpoint: 0.0.0.0:9411

# Ingester processes and stores traces
ingester:
  max_block_duration: 5m

# Compactor merges blocks for better query performance
compactor:
  compaction:
    block_retention: 48h

# Storage configuration - using local filesystem for dev
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 10000

# Metrics generator (optional - creates metrics from spans)
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: docker-compose
  storage:
    path: /var/tempo/generator/wal
  traces_storage:
    path: /var/tempo/generator/traces
  
# Overrides for specific tenants (multi-tenancy support)
overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
