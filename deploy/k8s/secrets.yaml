apiVersion: v1
kind: Secret
metadata:
  name: mpiper-secrets
  namespace: mpiper
type: Opaque
stringData:
  # Database credentials
  DB_USER: "postgres"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # Redis password (if required)
  REDIS_PASSWORD: ""

  # GCS Service Account JSON (base64 encode your actual JSON file)
  # Create with: kubectl create secret generic mpiper-secrets --from-file=gcs-credentials=./service-account.json -n mpiper
---
apiVersion: v1
kind: Secret
metadata:
  name: gcs-credentials
  namespace: mpiper
type: Opaque
# Mount your GCS service account JSON here
# Create with: kubectl create secret generic gcs-credentials --from-file=key.json=./path/to/service-account.json -n mpiper

