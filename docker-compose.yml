# ============================================================================
# MPiper — Core services
#
#   docker compose up
#
# Core stack: api, worker, postgres, redis on the `mpiper_net` bridge network.
# Services address each other by service name (DB_HOST=postgres, etc.).
#
# Optional observability overlay (otel-collector + Grafana/Tempo/Prometheus/Loki):
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up
#
# Copy .env.example -> .env.local and fill in required values before running.
# ============================================================================

name: mpiper

services:
  # ==========================================================================
  # Go API server
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: deploy/docker/mpiper.dockerfile
    container_name: mpiper-api
    env_file:
      - .env.local
    environment:
      # Compose-internal addressing — services reach each other by name.
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_CONNECTION_STRING: redis://redis:6379/0
      # Storage — use the local MinIO instance.
      BUCKET_PROVIDER: s3
      S3_BUCKET_NAME: mpiper
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT_URL: http://minio:9000
      # Client-facing endpoint baked into presigned + public URLs. Internal
      # services reach MinIO at minio:9000, but host clients (and the demo
      # script) must use the published localhost:9000. SigV4 signs the Host
      # header, so presigning has to target the host the client will connect to.
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      # Always apply migrations on first run; override in a compose override file.
      AUTO_MIGRATE: "true"
    ports:
      - "5010:5010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mpiper_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/mpiper", "--health-check"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ==========================================================================
  # Python media worker
  # ==========================================================================
  worker:
    build:
      context: .
      dockerfile: deploy/docker/worker.dockerfile
    container_name: mpiper-worker
    env_file:
      - .env.local
    environment:
      # Compose-internal addressing — services reach each other by name.
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_CONNECTION_STRING: redis://redis:6379/0
      # Storage — use the local MinIO instance.
      BUCKET_PROVIDER: s3
      S3_BUCKET_NAME: mpiper
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT_URL: http://minio:9000
      # Variant URLs persisted to the DB use this client-facing endpoint so they
      # are reachable from the host/browser; actual object I/O uses minio:9000.
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      AUTO_MIGRATE: "false"
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mpiper_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker_healthy || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # ==========================================================================
  # Postgres — durable source of truth
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: mpiper-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-mpiper}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-mpiper}
    ports:
      - "5433:5432"
    volumes:
      - mpiper_postgres_data:/var/lib/postgresql/data
    networks:
      - mpiper_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ==========================================================================
  # Redis — transport-only (ephemeral, no volume by design)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: mpiper-redis
    ports:
      - "6380:6379"
    networks:
      - mpiper_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==========================================================================
  # MinIO — local S3-compatible object storage
  # ==========================================================================
  minio:
    image: minio/minio:latest
    container_name: mpiper-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - mpiper_minio_data:/data
    networks:
      - mpiper_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # One-shot container that creates the default bucket on first run.
  minio-init:
    image: minio/mc:latest
    container_name: mpiper-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/mpiper &&
      mc anonymous set download local/mpiper
      "
    networks:
      - mpiper_net

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  mpiper_net:
    driver: bridge
    name: mpiper_net

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  mpiper_postgres_data:   # Postgres data — persists across restarts
  mpiper_minio_data:      # MinIO object data — persists across restarts
