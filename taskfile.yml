version: '3'

dotenv: [".env", ".env.local"]

includes:
  build: ./taskfiles/build.yml
  dev: ./taskfiles/dev.yml
  db: ./taskfiles/db.yml
  docker: ./taskfiles/docker.yml
  lint: ./taskfiles/lint.yml
  test: ./taskfiles/test.yml

vars:
  APP_NAME: mpiper
  BUILD_DIR: build
  MAIN_PATH: cmd/server/main.go

tasks:
  default:
    cmds:
      - task: dev:run

  ci:
    desc: Run full CI pipeline
    cmds:
      - task: lint:all
      - task: test:all
      - task: build:prod