# docker-compose.webhooks.yml
# Overlay for webhook dev-testing. Run with:
#   docker compose -f docker-compose.yml -f docker-compose.webhooks.yml up
#
# Adds a lightweight webhook receiver that logs all incoming POST requests.

services:
  webhook-receiver:
    image: mendhak/http-https-echo:latest
    container_name: mpiper-webhook-receiver
    ports:
      # Host 8899 (not 8888 — that collides with the otel-collector). Internal
      # delivery uses the docker-network name http://webhook-receiver:8080.
      - "8899:8080"
    environment:
      HTTP_PORT: 8080
    networks:
      - mpiper_net
    restart: unless-stopped
