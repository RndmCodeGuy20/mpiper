# ============================================================================
# Prometheus Configuration
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'mpiper-local'
    environment: 'development'

# SLO recording rules (Track 3, Phase 3). Mounted into the container at
# /etc/prometheus/ alongside this file by docker-compose.observability.yml.
rule_files:
  - /etc/prometheus/prometheus.rules.yml

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape OTEL Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'otel-collector'

  # Scrape OTEL Collector Prometheus exporter
  - job_name: 'otel-metrics'
    static_configs:
      - targets: ['otel-collector:8889']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'mpiper-otel'

  # Scrape Tempo metrics
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']

  # Scrape Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Scrape your MPiper API (if it exposes Prometheus metrics)
  # Uncomment and adjust when you add metrics endpoint to your Go app
  # - job_name: 'mpiper-api'
  #   static_configs:
  #     - targets: ['host.docker.internal:8080']
