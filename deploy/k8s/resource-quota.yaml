apiVersion: v1
kind: ResourceQuota
metadata:
  name: mpiper-quota
  namespace: mpiper
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    persistentvolumeclaims: "10"
    services.loadbalancers: "2"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: mpiper-limits
  namespace: mpiper
spec:
  limits:
  - max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container
apiVersion: v1
kind: Namespace
metadata:
  name: mpiper
  labels:
    app: mpiper
    environment: production

